<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">
  <title>CD Library - Attributes Test</title>
  <g id="line-styles">
    <text x="50" y="30" font-size="14" font-weight="bold">Line Styles</text>
    <line x1="50" y1="50" x2="300" y2="50" stroke="black" stroke-width="3" stroke-dasharray="none"/>
    <text x="320" y="50" font-size="12" dy="0.3em">Solid</text>
    <line x1="50" y1="75" x2="300" y2="75" stroke="black" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="320" y="75" font-size="12" dy="0.3em">Dashed</text>
    <line x1="50" y1="100" x2="300" y2="100" stroke="black" stroke-width="3" stroke-dasharray="2,2"/>
    <text x="320" y="100" font-size="12" dy="0.3em">Dotted</text>
    <line x1="50" y1="125" x2="300" y2="125" stroke="black" stroke-width="3" stroke-dasharray="10,5,2,5"/>
    <text x="320" y="125" font-size="12" dy="0.3em">Dash-Dot</text>
    <line x1="50" y1="150" x2="300" y2="150" stroke="black" stroke-width="3" stroke-dasharray="10,5,2,5,2,5"/>
    <text x="320" y="150" font-size="12" dy="0.3em">Dash-Dot-Dot</text>
  </g>
  <g id="colors">
    <text x="50" y="210" font-size="14" font-weight="bold">Color Palette</text>
    <rect x="50" y="230" width="40" height="30" fill="red" stroke="black"/>
    <text x="70" y="275" font-size="10" text-anchor="middle">red</text>
    <rect x="95" y="230" width="40" height="30" fill="green" stroke="black"/>
    <text x="115" y="275" font-size="10" text-anchor="middle">green</text>
    <rect x="140" y="230" width="40" height="30" fill="blue" stroke="black"/>
    <text x="160" y="275" font-size="10" text-anchor="middle">blue</text>
    <rect x="185" y="230" width="40" height="30" fill="yellow" stroke="black"/>
    <text x="205" y="275" font-size="10" text-anchor="middle">yellow</text>
    <rect x="230" y="230" width="40" height="30" fill="magenta" stroke="black"/>
    <text x="250" y="275" font-size="10" text-anchor="middle">magenta</text>
    <rect x="275" y="230" width="40" height="30" fill="cyan" stroke="black"/>
    <text x="295" y="275" font-size="10" text-anchor="middle">cyan</text>
    <rect x="320" y="230" width="40" height="30" fill="orange" stroke="black"/>
    <text x="340" y="275" font-size="10" text-anchor="middle">orange</text>
    <rect x="365" y="230" width="40" height="30" fill="purple" stroke="black"/>
    <text x="385" y="275" font-size="10" text-anchor="middle">purple</text>
  </g>
  <g id="patterns">
    <defs>
      <pattern id="hatch1" width="8" height="8" patternUnits="userSpaceOnUse">
        <rect width="8" height="8" fill="white"/>
        <path d="M0,0 L8,8" stroke="red" stroke-width="1"/>
      </pattern>
      <pattern id="hatch2" width="8" height="8" patternUnits="userSpaceOnUse">
        <rect width="8" height="8" fill="lightblue"/>
        <path d="M0,8 L8,0" stroke="blue" stroke-width="1"/>
      </pattern>
    </defs>
    <text x="50" y="330" font-size="14" font-weight="bold">Fill Patterns</text>
    <rect x="50" y="350" width="80" height="60" fill="url(#hatch1)" stroke="black"/>
    <rect x="150" y="350" width="80" height="60" fill="url(#hatch2)" stroke="black"/>
    <rect x="250" y="350" width="80" height="60" fill="yellow" stroke="black" stroke-width="3"/>
    <text x="90" y="430" font-size="10" text-anchor="middle">Diagonal</text>
    <text x="190" y="430" font-size="10" text-anchor="middle">Cross</text>
    <text x="290" y="430" font-size="10" text-anchor="middle">Solid</text>
  </g>
  <g id="transparency">
    <text x="450" y="330" font-size="14" font-weight="bold">Transparency</text>
    <circle cx="470" cy="370" r="25" fill="red" opacity="1.0"/>
    <text x="470" y="410" font-size="10" text-anchor="middle">100%</text>
    <circle cx="500" cy="370" r="25" fill="red" opacity="0.8"/>
    <text x="500" y="410" font-size="10" text-anchor="middle">80%</text>
    <circle cx="530" cy="370" r="25" fill="red" opacity="0.6"/>
    <text x="530" y="410" font-size="10" text-anchor="middle">60%</text>
    <circle cx="560" cy="370" r="25" fill="red" opacity="0.4"/>
    <text x="560" y="410" font-size="10" text-anchor="middle">40%</text>
    <circle cx="590" cy="370" r="25" fill="red" opacity="0.2"/>
    <text x="590" y="410" font-size="10" text-anchor="middle">20%</text>
  </g>
</svg>
