name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run security scan weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

permissions:
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      matrix:
        language: [ 'c-cpp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxft-dev \
          libcairo2-dev \
          libpango1.0-dev \
          libfreetype6-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libtiff5-dev \
          libpng-dev \
          libjpeg-dev \
          zlib1g-dev

    - name: Checkout IM dependency
      uses: actions/checkout@v4
      with:
        repository: lispnik/tecgraf-im
        path: im-git
        ref: master

    - name: Build IM dependency
      run: |
        cd im-git
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=../install
        make -j$(nproc)
        make install

    - name: Build CD
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DIM_INCLUDE_DIR=../im-git/install/include \
          -DIM_LIBRARY=../im-git/install/lib/libim.so \
          -DCD_ENABLE_CAIRO=ON \
          -DCD_ENABLE_GL=ON \
          -DCD_ENABLE_PDF=ON \
          -DCD_ENABLE_IM=ON
        make -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  sanitizers:
    name: Sanitizer Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        sanitizer: [address, undefined, thread]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxft-dev \
          libcairo2-dev \
          libpango1.0-dev \
          libfreetype6-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libtiff5-dev \
          libpng-dev \
          libjpeg-dev \
          zlib1g-dev \
          clang

    - name: Checkout IM dependency
      uses: actions/checkout@v4
      with:
        repository: lispnik/tecgraf-im
        path: im-git
        ref: master

    - name: Build IM dependency
      run: |
        cd im-git
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_INSTALL_PREFIX=../install
        make -j$(nproc)
        make install

    - name: Build with ${{ matrix.sanitizer }} sanitizer
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_C_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer" \
          -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}" \
          -DCMAKE_MODULE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}" \
          -DIM_INCLUDE_DIR=../im-git/install/include \
          -DIM_LIBRARY=../im-git/install/lib/libim.so \
          -DCD_BUILD_TESTS=ON
        make -j$(nproc)

    - name: Run tests with sanitizer
      run: |
        cd build
        export ASAN_OPTIONS="check_initialization_order=1:strict_init_order=1"
        export UBSAN_OPTIONS="print_stacktrace=1"
        export TSAN_OPTIONS="halt_on_error=1"
        ctest --output-on-failure || true

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          cppcheck \
          clang-tools \
          pkg-config \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxft-dev \
          libcairo2-dev \
          libpango1.0-dev \
          libfreetype6-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libtiff5-dev \
          libpng-dev \
          libjpeg-dev \
          zlib1g-dev

    - name: Run cppcheck
      run: |
        cppcheck --enable=all --inconclusive --xml --xml-version=2 \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --force \
          src/ include/ 2> cppcheck-report.xml

    - name: Run clang-tidy
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        cd ..
        find src/ -name "*.c" -exec clang-tidy {} -p build/ \; || true

    - name: Upload cppcheck report
      uses: actions/upload-artifact@v4
      with:
        name: cppcheck-report
        path: cppcheck-report.xml