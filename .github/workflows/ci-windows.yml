name: Windows CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    timeout-minutes: 60
    strategy:
      matrix:
        build_type: [Release, Debug]

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v1.3

    - name: Install dependencies with vcpkg
      run: |
        vcpkg install freetype:x64-windows
        vcpkg integrate install

    - name: Download IM artifacts
      uses: dawidd6/action-download-artifact@v2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        workflow: ci-windows.yml
        repo: lispnik/tecgraf-im
        branch: master
        name: im-libs-windows-2022
        path: im-git/install/lib

    - name: Download IM headers
      uses: dawidd6/action-download-artifact@v2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        workflow: ci-windows.yml
        repo: lispnik/tecgraf-im
        branch: master
        name: im-headers-windows-2022
        path: im-git/install/include

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. `
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
          -DCMAKE_INSTALL_PREFIX=../install `
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
          -DBUILD_SHARED_LIBS=ON `
          -DIM_INCLUDE_DIR=../im-git/install/include `
          -DIM_LIBRARY=../im-git/install/lib/im.lib `
          -DCD_ENABLE_GDIPLUS=ON `
          -DCD_ENABLE_DIRECT2D=ON `
          -DCD_ENABLE_GL=OFF `
          -DCD_ENABLE_PDF=OFF `
          -DCD_ENABLE_SIM=ON `
          -DCD_ENABLE_IM=OFF `
          -DCD_ENABLE_LUA=OFF

    - name: Build
      run: |
        cd build
        cmake --build . --config ${{ matrix.build_type }} --parallel

    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure -C ${{ matrix.build_type }}

    - name: Install
      run: |
        cd build
        cmake --install . --config ${{ matrix.build_type }}

    - name: Package artifacts
      run: |
        # Package build outputs directly since install step doesn't create install directory on Windows
        New-Item -ItemType Directory -Path "artifacts\bin" -Force
        New-Item -ItemType Directory -Path "artifacts\lib" -Force
        New-Item -ItemType Directory -Path "artifacts\include" -Force
        New-Item -ItemType Directory -Path "artifacts\fonts" -Force

        # Copy DLLs and executables
        Copy-Item "build\${{ matrix.build_type }}\*.dll" "artifacts\bin\" -ErrorAction SilentlyContinue
        Copy-Item "build\${{ matrix.build_type }}\*.exe" "artifacts\bin\" -ErrorAction SilentlyContinue

        # Copy import libraries (.lib files) - check multiple locations
        Copy-Item "build\${{ matrix.build_type }}\*.lib" "artifacts\lib\" -ErrorAction SilentlyContinue
        Copy-Item "build\*.lib" "artifacts\lib\" -ErrorAction SilentlyContinue

        # Copy header files
        Copy-Item "include\*" "artifacts\include\" -Recurse -ErrorAction SilentlyContinue

        # Copy font files
        Copy-Item "etc\*" "artifacts\fonts\" -Recurse -ErrorAction SilentlyContinue

        # Debug: List what was copied
        Write-Host "=== Files copied ==="
        Get-ChildItem "artifacts" -Recurse | Select-Object Name, FullName

        Compress-Archive -Path "artifacts\*" -DestinationPath cd-windows-${{ matrix.build_type }}.zip

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cd-windows-${{ matrix.build_type }}
        path: cd-windows-${{ matrix.build_type }}.zip

