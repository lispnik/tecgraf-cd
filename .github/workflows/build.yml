name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release, Debug]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies (Linux)
      if: matrix.platform == 'linux'
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/apt
        key: ${{ runner.os }}-deps-${{ hashFiles('**/apt-packages.txt') }}

    - name: Cache dependencies (macOS)
      if: matrix.platform == 'macos'
      uses: actions/cache@v3
      with:
        path: |
          /usr/local/Cellar
          /usr/local/lib
          /usr/local/include
        key: ${{ runner.os }}-deps-${{ hashFiles('**/brew-packages.txt') }}

    - name: Install system dependencies (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxft-dev \
          libcairo2-dev \
          libpango1.0-dev \
          libfreetype6-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          liblua5.4-dev \
          lua5.4 \
          libtiff-dev \
          libpng-dev \
          libjpeg-dev \
          zlib1g-dev \
          libexif-dev \
          liblzf-dev \
          liblz4-dev \
          libfftw3-dev \
          libomp-dev

    - name: Install system dependencies (macOS)
      if: matrix.platform == 'macos'
      run: |
        brew install \
          cmake \
          pkg-config \
          cairo \
          pango \
          freetype \
          lua \
          libtiff \
          libpng \
          jpeg \
          libexif \
          jasper \
          fftw

    - name: Setup MSVC (Windows)
      if: matrix.platform == 'windows'
      uses: microsoft/setup-msbuild@v1.3

    - name: Checkout IM dependency
      uses: actions/checkout@v4
      with:
        repository: lispnik/tecgraf-im
        path: im-git
        ref: master

    - name: Build IM dependency (Linux/macOS)
      if: matrix.platform != 'windows'
      run: |
        cd im-git
        # Use exact same configuration as working IM repository
        if [ "${{ matrix.platform }}" = "linux" ]; then
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=install \
            -DIM_BUILD_JP2=OFF
          cmake --build build -j $(nproc)
        else
          # macOS build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=install \
            -DIM_BUILD_JP2=ON
          cmake --build build -j $(sysctl -n hw.ncpu)
        fi
        cmake --install build

    - name: Build IM dependency (Windows)
      if: matrix.platform == 'windows'
      run: |
        cd im-git
        mkdir build
        cd build
        cmake .. `
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
          -DCMAKE_INSTALL_PREFIX=../install `
          -DIM_BUILD_JP2=OFF `
          -DIM_BUILD_PROCESS=OFF `
          -DIM_BUILD_FFTW=OFF `
          -DIM_BUILD_LUA=OFF
        cmake --build . --config ${{ matrix.build_type }} --parallel
        cmake --install . --config ${{ matrix.build_type }}

    - name: Configure CMake (Linux/macOS)
      if: matrix.platform != 'windows'
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_INSTALL_PREFIX=../install \
          -DIM_INCLUDE_DIR=../im-git/install/include \
          -DIM_LIBRARY=../im-git/install/lib/libim.so \
          -DCD_ENABLE_CAIRO=ON \
          -DCD_ENABLE_GL=ON \
          -DCD_ENABLE_PDF=ON \
          -DCD_ENABLE_IM=ON \
          -DCD_ENABLE_LUA=ON

    - name: Configure CMake (macOS specific)
      if: matrix.platform == 'macos'
      run: |
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_INSTALL_PREFIX=../install \
          -DIM_INCLUDE_DIR=../im-git/install/include \
          -DIM_LIBRARY=../im-git/install/lib/libim.dylib \
          -DCD_ENABLE_CAIRO=ON \
          -DCD_ENABLE_GL=ON \
          -DCD_ENABLE_PDF=ON \
          -DCD_ENABLE_IM=ON \
          -DCD_ENABLE_LUA=ON \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15

    - name: Configure CMake (Windows)
      if: matrix.platform == 'windows'
      run: |
        mkdir build
        cd build
        cmake .. `
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
          -DCMAKE_INSTALL_PREFIX=../install `
          -DIM_INCLUDE_DIR=../im-git/install/include `
          -DIM_LIBRARY=../im-git/install/lib/im.lib `
          -DCD_ENABLE_GDIPLUS=ON `
          -DCD_ENABLE_DIRECT2D=ON `
          -DCD_ENABLE_PDF=ON `
          -DCD_ENABLE_IM=ON `
          -DCD_ENABLE_LUA=OFF

    - name: Build (Linux/macOS)
      if: matrix.platform != 'windows'
      run: |
        cd build
        make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

    - name: Build (Windows)
      if: matrix.platform == 'windows'
      run: |
        cd build
        cmake --build . --config ${{ matrix.build_type }} --parallel

    - name: Run tests (Linux/macOS)
      if: matrix.platform != 'windows'
      run: |
        cd build
        ctest --output-on-failure

    - name: Run tests (Windows)
      if: matrix.platform == 'windows'
      run: |
        cd build
        ctest --output-on-failure -C ${{ matrix.build_type }}

    - name: Install
      run: |
        cd build
        cmake --install . --config ${{ matrix.build_type }}

    - name: Package artifacts
      run: |
        tar -czf cd-${{ matrix.platform }}-${{ matrix.build_type }}.tar.gz install/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cd-${{ matrix.platform }}-${{ matrix.build_type }}
        path: cd-${{ matrix.platform }}-${{ matrix.build_type }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: cd-*
        merge-multiple: true

    - name: Create release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          cd-linux-Release/cd-linux-Release.tar.gz
          cd-macos-Release/cd-macos-Release.tar.gz
          cd-windows-Release/cd-windows-Release.tar.gz