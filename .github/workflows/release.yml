name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: cd-linux-x86_64
          - os: macos-latest
            platform: macos
            artifact_name: cd-macos-universal
          - os: windows-latest
            platform: windows
            artifact_name: cd-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies (Linux)
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxft-dev \
          libcairo2-dev \
          libpango1.0-dev \
          libfreetype6-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          liblua5.3-dev

    - name: Install system dependencies (macOS)
      if: matrix.platform == 'macos'
      run: |
        brew install \
          cmake \
          pkg-config \
          cairo \
          pango \
          freetype \
          lua

    - name: Setup MSVC (Windows)
      if: matrix.platform == 'windows'
      uses: microsoft/setup-msbuild@v1.3

    - name: Checkout IM dependency
      uses: actions/checkout@v4
      with:
        repository: lispnik/tecgraf-im
        path: im-git
        ref: macos-system-libs-and-fixes

    - name: Build IM dependency (Linux/macOS)
      if: matrix.platform != 'windows'
      run: |
        cd im-git
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=../install \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON
        make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        make install

    - name: Build IM dependency (Windows)
      if: matrix.platform == 'windows'
      run: |
        cd im-git
        mkdir build
        cd build
        cmake .. `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_INSTALL_PREFIX=../install
        cmake --build . --config Release --parallel
        cmake --install . --config Release

    - name: Configure CMake (Linux)
      if: matrix.platform == 'linux'
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=../install \
          -DIM_INCLUDE_DIR=../im-git/install/include \
          -DIM_LIBRARY=../im-git/install/lib/libim.so \
          -DCD_ENABLE_CAIRO=ON \
          -DCD_ENABLE_GL=ON \
          -DCD_ENABLE_PDF=ON \
          -DCD_ENABLE_IM=ON \
          -DCD_ENABLE_LUA=ON \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON

    - name: Configure CMake (macOS)
      if: matrix.platform == 'macos'
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=../install \
          -DIM_INCLUDE_DIR=../im-git/install/include \
          -DIM_LIBRARY=../im-git/install/lib/libim.dylib \
          -DCD_ENABLE_CAIRO=ON \
          -DCD_ENABLE_GL=ON \
          -DCD_ENABLE_PDF=ON \
          -DCD_ENABLE_IM=ON \
          -DCD_ENABLE_LUA=ON \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 \
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

    - name: Configure CMake (Windows)
      if: matrix.platform == 'windows'
      run: |
        mkdir build
        cd build
        cmake .. `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_INSTALL_PREFIX=../install `
          -DIM_INCLUDE_DIR=../im-git/install/include `
          -DIM_LIBRARY=../im-git/install/lib/im.lib `
          -DCD_ENABLE_GDIPLUS=ON `
          -DCD_ENABLE_DIRECT2D=ON `
          -DCD_ENABLE_PDF=ON `
          -DCD_ENABLE_IM=ON `
          -DCD_ENABLE_LUA=OFF

    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel

    - name: Install
      run: |
        cd build
        cmake --install . --config Release

    - name: Package release
      run: |
        tar -czf ${{ matrix.artifact_name }}.tar.gz install/

    - name: Upload to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ${{ matrix.artifact_name }}.tar.gz
        asset_name: ${{ matrix.artifact_name }}.tar.gz
        asset_content_type: application/gzip