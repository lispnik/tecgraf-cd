name: Linux CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    timeout-minutes: 60
    strategy:
      matrix:
        build_type: [Release, Debug]

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/apt
        key: ${{ runner.os }}-deps-v2-${{ hashFiles('.github/workflows/ci-linux.yml') }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          libx11-dev \
          libxext-dev \
          libxrender-dev \
          libxft-dev \
          libcairo2-dev \
          libpango1.0-dev \
          libfreetype6-dev \
          libftgl-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          liblua5.4-dev \
          lua5.4 \
          libtiff-dev \
          libpng-dev \
          libjpeg-dev \
          zlib1g-dev \
          libexif-dev \
          liblzf-dev \
          liblz4-dev \
          libfftw3-dev \
          libomp-dev \
          libgtk-3-dev

    - name: Download IM artifacts
      uses: dawidd6/action-download-artifact@v2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        workflow: ci-linux.yml
        repo: lispnik/tecgraf-im
        branch: master
        name: im-libs-ubuntu-24.04
        path: im-git/install/lib

    - name: Download IM headers
      uses: dawidd6/action-download-artifact@v2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        workflow: ci-linux.yml
        repo: lispnik/tecgraf-im
        branch: master
        name: im-headers-ubuntu-24.04
        path: im-git/install/include

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_INSTALL_PREFIX=../install \
          -DIM_INCLUDE_DIR=../im-git/install/include \
          -DIM_LIBRARY=../im-git/install/lib/libim.so \
          -DCD_ENABLE_CAIRO=ON \
          -DCD_ENABLE_GL=ON \
          -DCD_ENABLE_PDF=ON \
          -DCD_ENABLE_IM=ON \
          -DCD_ENABLE_LUA=ON

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Install
      run: |
        cd build
        cmake --install . --config ${{ matrix.build_type }}

    - name: Package artifacts
      run: |
        tar -czf cd-linux-${{ matrix.build_type }}.tar.gz install/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cd-linux-${{ matrix.build_type }}
        path: cd-linux-${{ matrix.build_type }}.tar.gz

    - name: Trigger CD bindings CI
      if: success() && github.ref == 'refs/heads/main' && matrix.build_type == 'Release'
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.DISPATCH_TOKEN }}
        repository: lispnik/cd
        event-type: tecgraf-cd-build-complete
        client-payload: '{"platform": "linux", "workflow": "ci-linux.yml"}'