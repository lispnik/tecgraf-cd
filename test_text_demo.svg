<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">
  <title>CD Library - Text Test</title>
  <g id="font-sizes">
    <text x="50" y="30" font-size="16" font-weight="bold">Font Sizes</text>
    <text x="50" y="60" font-size="8" font-family="Arial">Size 8: The quick brown fox</text>
    <text x="50" y="73" font-size="10" font-family="Arial">Size 10: The quick brown fox</text>
    <text x="50" y="88" font-size="12" font-family="Arial">Size 12: The quick brown fox</text>
    <text x="50" y="105" font-size="14" font-family="Arial">Size 14: The quick brown fox</text>
    <text x="50" y="124" font-size="18" font-family="Arial">Size 18: The quick brown fox</text>
    <text x="50" y="147" font-size="24" font-family="Arial">Size 24: The quick brown fox</text>
    <text x="50" y="176" font-size="32" font-family="Arial">Size 32: The quick brown fox</text>
  </g>
  <g id="font-styles">
    <text x="450" y="60" font-size="14" font-weight="bold">Font Styles</text>
    <text x="450" y="90" font-size="14" font-family="Arial">Normal Text</text>
    <text x="450" y="115" font-size="14" font-family="Arial" font-weight="bold">Bold Text</text>
    <text x="450" y="140" font-size="14" font-family="Arial" font-style="italic">Italic Text</text>
    <text x="450" y="165" font-size="14" font-family="Arial" font-weight="bold" font-style="italic">Bold Italic</text>
    <text x="450" y="190" font-size="14" font-family="Arial" text-decoration="underline">Underlined</text>
  </g>
  <g id="text-alignment">
    <text x="100" y="330" font-size="16" font-weight="bold">Text Alignment</text>
    <circle cx="200" cy="400" r="3" fill="red"/>
    <text x="210" y="400" text-anchor="start" font-size="12">← Start (Left)</text>
    <text x="200" y="380" text-anchor="middle" font-size="12">Middle (Center)</text>
    <text x="190" y="420" text-anchor="end" font-size="12">End (Right) →</text>
  </g>
  <g id="text-rotation">
    <text x="500" y="330" font-size="16" font-weight="bold">Text Rotation</text>
    <circle cx="600" cy="450" r="3" fill="red"/>
    <text x="660" y="450" font-size="12" text-anchor="middle" transform="rotate(0 660 450)">0°</text>
    <text x="642" y="492" font-size="12" text-anchor="middle" transform="rotate(45 642 492)">45°</text>
    <text x="600" y="510" font-size="12" text-anchor="middle" transform="rotate(90 600 510)">90°</text>
    <text x="558" y="492" font-size="12" text-anchor="middle" transform="rotate(135 558 492)">135°</text>
    <text x="540" y="450" font-size="12" text-anchor="middle" transform="rotate(180 540 450)">180°</text>
    <text x="558" y="408" font-size="12" text-anchor="middle" transform="rotate(225 558 408)">225°</text>
    <text x="600" y="390" font-size="12" text-anchor="middle" transform="rotate(270 600 390)">270°</text>
    <text x="642" y="408" font-size="12" text-anchor="middle" transform="rotate(315 642 408)">315°</text>
  </g>
</svg>
